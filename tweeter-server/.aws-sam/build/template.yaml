                    responseParameters:
                      method.response.header.Access-Control-Allow-Origin: '''*'''
                  .*bad-request.*:
                    statusCode: 400
                    responseParameters:
                      method.response.header.Access-Control-Allow-Origin: '''*'''
                    responseTemplates:
                      application/json: '{ "error": "$input.path(''$.errorMessage'')"
                        }'
                  .*unauthorized.*:
                    statusCode: 401
                    responseParameters:
                      method.response.header.Access-Control-Allow-Origin: '''*'''
                    responseTemplates:
                      application/json: '{ "error": "$input.path(''$.errorMessage'')"
                        }'
                  .*internal-server-error.*:
                    statusCode: 500
                    responseParameters:
                      method.response.header.Access-Control-Allow-Origin: '''*'''
                    responseTemplates:
                      application/json: '{ "error": "$input.path(''$.errorMessage'')"
                        }'
              responses:
                '200':
                  description: OK
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                '400':
                  description: Bad Request
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                '401':
                  description: Unauthorized
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
                '500':
                  description: Internal Server Error
                  headers:
                    Access-Control-Allow-Origin:
                      type: string
