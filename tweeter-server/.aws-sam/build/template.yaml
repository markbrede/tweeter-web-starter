          version: '1.0'
        x-common-consumes:
        - application/json
        x-common-produces:
        - application/json
        x-common-request-templates:
          application/json: $input.json('$')
        x-common-amazon-responses:
          default:
            statusCode: 200
            responseParameters:
              method.response.header.Access-Control-Allow-Origin: '''*'''
          .*bad-request.*:
            statusCode: 400
            responseParameters:
              method.response.header.Access-Control-Allow-Origin: '''*'''
            responseTemplates:
              application/json: '{ "error": "$input.path(''$.errorMessage'')" }'
          .*unauthorized.*:
            statusCode: 401
            responseParameters:
              method.response.header.Access-Control-Allow-Origin: '''*'''
            responseTemplates:
              application/json: '{ "error": "$input.path(''$.errorMessage'')" }'
          .*internal-server-error.*:
            statusCode: 500
            responseParameters:
              method.response.header.Access-Control-Allow-Origin: '''*'''
            responseTemplates:
              application/json: '{ "error": "$input.path(''$.errorMessage'')" }'
        x-common-swagger-responses:
          '200':
            description: OK
            headers:
              Access-Control-Allow-Origin:
                type: string
          '400':
            description: Bad Request
            headers:
              Access-Control-Allow-Origin:
                type: string
          '401':
            description: Unauthorized
            headers:
              Access-Control-Allow-Origin:
                type: string
          '500':
